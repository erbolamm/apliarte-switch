name: Release — Compilar binarios para todas las plataformas

on:
  push:
    tags:
      - 'v*'           # Se dispara al crear un tag como v0.1.0

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: apliarte-switch

jobs:
  build:
    name: Compilar ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Intel
          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name: apliarte-switch-x86_64-apple-darwin

          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: apliarte-switch-aarch64-apple-darwin

          # Linux x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: apliarte-switch-x86_64-unknown-linux-gnu

          # Windows x64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_name: apliarte-switch-x86_64-pc-windows-msvc.exe

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache de dependencias Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Compilar en release
        working-directory: core
        run: cargo build --release --target ${{ matrix.target }}

      # En Linux también generamos .deb para facilitar la instalación
      - name: Generar .deb (solo Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo install cargo-deb
          cd core && cargo deb --target ${{ matrix.target }}

      - name: Preparar binario para subir
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp core/target/${{ matrix.target }}/release/${{ env.BIN_NAME }}.exe ${{ matrix.asset_name }}
          else
            cp core/target/${{ matrix.target }}/release/${{ env.BIN_NAME }} ${{ matrix.asset_name }}
          fi

      - name: Subir binario como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Crear Release en GitHub
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar todos los binarios
        uses: actions/download-artifact@v4

      - name: Crear GitHub Release y subir binarios
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apliarte-switch-x86_64-apple-darwin/apliarte-switch-x86_64-apple-darwin
            apliarte-switch-aarch64-apple-darwin/apliarte-switch-aarch64-apple-darwin
            apliarte-switch-x86_64-unknown-linux-gnu/apliarte-switch-x86_64-unknown-linux-gnu
            apliarte-switch-x86_64-pc-windows-msvc.exe/apliarte-switch-x86_64-pc-windows-msvc.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
